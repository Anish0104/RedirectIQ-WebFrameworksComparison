# Proxies public HTTP traffic to the internal Gunicorn backend for RedirectIQ using Apache.
ServerRoot "/private/etc/apache2"
ServerName localhost
Listen 3004
PidFile "/Users/anish/Documents/redirectiq/apache-proxy/logs/httpd.pid"
ErrorLog "/Users/anish/Documents/redirectiq/apache-proxy/logs/error_log"
LogLevel warn

<IfModule !mpm_prefork_module>
LoadModule mpm_prefork_module /usr/libexec/apache2/mod_mpm_prefork.so
</IfModule>
<IfModule !authz_core_module>
LoadModule authz_core_module /usr/libexec/apache2/mod_authz_core.so
</IfModule>
<IfModule !authz_host_module>
LoadModule authz_host_module /usr/libexec/apache2/mod_authz_host.so
</IfModule>
<IfModule !unixd_module>
LoadModule unixd_module /usr/libexec/apache2/mod_unixd.so
</IfModule>
<IfModule !dir_module>
LoadModule dir_module /usr/libexec/apache2/mod_dir.so
</IfModule>
<IfModule !mime_module>
LoadModule mime_module /usr/libexec/apache2/mod_mime.so
</IfModule>
<IfModule !alias_module>
LoadModule alias_module /usr/libexec/apache2/mod_alias.so
</IfModule>
<IfModule !log_config_module>
LoadModule log_config_module /usr/libexec/apache2/mod_log_config.so
</IfModule>
<IfModule !headers_module>
LoadModule headers_module /usr/libexec/apache2/mod_headers.so
</IfModule>
<IfModule !proxy_module>
LoadModule proxy_module /usr/libexec/apache2/mod_proxy.so
</IfModule>
<IfModule !proxy_http_module>
LoadModule proxy_http_module /usr/libexec/apache2/mod_proxy_http.so
</IfModule>

TypesConfig /private/etc/apache2/mime.types

<IfModule unixd_module>
    User _www
    Group _www
</IfModule>

<VirtualHost *:3004>
    ServerName localhost
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    ProxyPass / http://127.0.0.1:8004/
    ProxyPassReverse / http://127.0.0.1:8004/
    ErrorLog "/Users/anish/Documents/redirectiq/apache-proxy/logs/vhost_error_log"
    CustomLog "/Users/anish/Documents/redirectiq/apache-proxy/logs/vhost_access_log" common
</VirtualHost>
