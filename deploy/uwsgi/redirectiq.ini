; Runs the Flask RedirectIQ app behind uWSGI for the Nginx deployment path.
[uwsgi]
chdir = /Users/anish/Documents/redirectiq/python-flask
module = wsgi:application

master = true
processes = 4
threads = 2
enable-threads = true
single-interpreter = true
lazy-apps = true
vacuum = true
die-on-term = true
need-app = true

socket = 127.0.0.1:3031
chmod-socket = 660
buffer-size = 65535
harakiri = 30

env = PORT=3002
env = JWT_SECRET=supersecretkey123
env = DB_PATH=./redirectiq-flask.db
env = CACHE_TTL_SECONDS=60
env = PUBLIC_BASE_URL=http://localhost:8080

; Uncomment and adjust if you use a virtual environment:
; virtualenv = /Users/anish/Documents/redirectiq/python-flask/.venv
