# Serves RedirectIQ through Apache mod_wsgi with direct aliases for built frontend assets.
Listen 8081

WSGIPassAuthorization On
WSGIDaemonProcess redirectiq user=_www group=_www threads=8 python-home=/Users/anish/Documents/redirectiq/python-flask/.venv python-path=/Users/anish/Documents/redirectiq/python-flask
WSGIProcessGroup redirectiq
WSGIApplicationGroup %{GLOBAL}

SetEnv PORT 3003
SetEnv JWT_SECRET supersecretkey123
SetEnv DB_PATH ./redirectiq-apache.db
SetEnv CACHE_TTL_SECONDS 60
SetEnv PUBLIC_BASE_URL http://localhost:8081

<VirtualHost *:8081>
    ServerName localhost
    ErrorLog /tmp/redirectiq-apache-error.log
    CustomLog /tmp/redirectiq-apache-access.log combined

    Alias /assets /Users/anish/Documents/redirectiq/frontend/dist/assets
    Alias /favicon.svg /Users/anish/Documents/redirectiq/frontend/dist/favicon.svg
    Alias /icons.svg /Users/anish/Documents/redirectiq/frontend/dist/icons.svg

    <Directory /Users/anish/Documents/redirectiq/frontend/dist>
        Require all granted
    </Directory>

    WSGIScriptAlias / /Users/anish/Documents/redirectiq/python-flask/wsgi.py

    <Directory /Users/anish/Documents/redirectiq/python-flask>
        Require all granted
    </Directory>
</VirtualHost>
