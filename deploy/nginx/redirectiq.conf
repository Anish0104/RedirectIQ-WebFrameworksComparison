# Serves RedirectIQ through Nginx with static assets handled directly and Flask via uWSGI.
server {
    listen 8080;
    server_name localhost;

    access_log /tmp/redirectiq-nginx-access.log;
    error_log /tmp/redirectiq-nginx-error.log;

    location /assets/ {
        alias /Users/anish/Documents/redirectiq/frontend/dist/assets/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /favicon.svg {
        alias /Users/anish/Documents/redirectiq/frontend/dist/favicon.svg;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /icons.svg {
        alias /Users/anish/Documents/redirectiq/frontend/dist/icons.svg;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        include uwsgi_params;
        uwsgi_pass 127.0.0.1:3031;
        uwsgi_read_timeout 30s;
        uwsgi_param Host $host:$server_port;
        uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
        uwsgi_param X-Forwarded-Proto $scheme;
    }
}
