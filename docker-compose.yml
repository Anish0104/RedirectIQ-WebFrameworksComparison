services:
  node-express:
    build:
      context: ./node-express
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - node-express-db:/app/data
    networks:
      - redirectiq-net

  python-flask:
    build:
      context: ./python-flask
    restart: unless-stopped
    ports:
      - "3002:3002"
    volumes:
      - python-flask-db:/app/data
    networks:
      - redirectiq-net

  nginx-proxy:
    build:
      context: ./nginx-proxy
    restart: unless-stopped
    ports:
      - "3003:3003"
    volumes:
      - nginx-proxy-db:/app/data
    networks:
      - redirectiq-net

  apache-proxy:
    build:
      context: ./apache-proxy
    restart: unless-stopped
    ports:
      - "3004:3004"
    volumes:
      - apache-proxy-db:/app/data
    networks:
      - redirectiq-net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - node-express
      - python-flask
      - nginx-proxy
      - apache-proxy
    networks:
      - redirectiq-net

networks:
  redirectiq-net:
    name: redirectiq-net

volumes:
  node-express-db:
  python-flask-db:
  nginx-proxy-db:
  apache-proxy-db:
